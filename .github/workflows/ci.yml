name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  publish:
    name: Build and push image

    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7

      - name: Install Encore
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: encore build docker ghcr.io/jonahsnider/stars.jonahsnider.com

      - name: Push image
        run: docker push ghcr.io/jonahsnider/stars.jonahsnider.com:latest
